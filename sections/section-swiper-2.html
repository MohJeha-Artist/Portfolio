<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    
    <script defer src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js" ></script>
  
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");


/* body { background-color:  black;} */

.container {
  width: 100%;
}

.swiper {
  width: 100%;
  padding: 50px 0;
}

.swiper-slide {
  position: relative;
  width: 200px;
  height: 500px;
  border-radius: 12px;
  overflow: hidden;
  transition: all 1s;
}

.swiper-slide::after {
  content: "";
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  /* filter: grayscale(1); */
  background: linear-gradient(120deg, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8));
  mix-blend-mode: multiply;
  z-index: 1;
}

.swiper-slide img {
  width: 100%;
  height: 500px;
  object-fit: cover;
  transition: 1s;

}

.swiper-slide p {
  position: absolute;
  left: 20px;
  bottom: 10px;
  color: #fff;
  font-size: 1.3rem;
  font-weight: 600;
  font-style: italic;
  letter-spacing: 2px;
  z-index: 2;
  opacity: 0;
  transform: rotate(360deg) scale(0);
  transition: 0.8s;
}

.swiper-slide-active {

 
  position: relative;
  width: 512px;
  transition: 1s;
}

.swiper-slide-active::after {
  
  background: rgba(123, 123, 123, 0.4);
}

.swiper-slide-active img {
  transform: scale(1.3);
  object-position: 50% 0%;
}

.swiper-slide-active p {
  transform: rotate(0deg) scale(1);
  opacity: 1;
}





.hidden {
  display: none;
}


    </style>
</head>
  <body>

    


    <div class="container red">
      <div class="swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img src="../Assets/Arts/1.jpg" />
            <p>Superman</p>
          </div>
          <div class="swiper-slide">
            <img
              src="../Assets/Arts/2.jpg"
            />
            <p>Wonder Woman</p>
          </div>
          <div class="swiper-slide">
            <img
              src="../Assets/Arts/3.jpg"
            />
            <p>Batman</p>
          </div>
          <div class="swiper-slide">
            <img
              src="../Assets/Arts/4.jpg"
            />
            <p>Flash</p>
          </div>
          <div class="swiper-slide">
            <img
              src="../Assets/Arts/5.jpg"
            />
            <p>Joker</p>
          </div>
        </div>
      </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
      




var swiper = new Swiper(".swiper", {
  grabCursor: true,
  initialSlide: 2,
  centeredSlides: true,
  slidesPerView: "auto",
  spaceBetween: 10,
  speed: 1000,
  freeMode: false,
  mousewheel: {
    thresholdDelta: 30,
  },
  pagination: {
    el: ".swiper-pagination",
  },
  on: {
    click(event) {
      swiper.slideTo(this.clickedIndex);
    },
  },
});


    </script>
  </body>

</html>
