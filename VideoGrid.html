<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> TESTER </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .thumbnail {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .thumbnail:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .thumbnail img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .thumbnail-title {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: #333;
        }

        /* Video Overlay Styles */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .video-container {
            position: relative;
            width: 90%;
            max-width: 900px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: rgba(255, 0, 0, 0.7);
        }

        .video-player {
            width: 100%;
            height: 0;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            position: relative;
        }

        .video-player iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Video Gallery</h1>
        
        <div class="grid">
            <!-- Video 1 -->
            <div class="thumbnail" onclick="openVideo('1-iPgOj-8P4peuGogFJiHcACd0lIFbsrS', 'Digital World')">
                <img src="https://via.placeholder.com/300x200/4A90E2/ffffff?text=Digital+World" alt="Digital World">
                <div class="thumbnail-title">Digital World</div>
            </div>

            <!-- Video 2 -->
            <div class="thumbnail" onclick="openVideo('ANOTHER_VIDEO_ID_1', 'Project Alpha')">
                <img src="https://via.placeholder.com/300x200/50E3C2/ffffff?text=Project+Alpha" alt="Project Alpha">
                <div class="thumbnail-title">Project Alpha</div>
            </div>

            <!-- Video 3 -->
            <div class="thumbnail" onclick="openVideo('ANOTHER_VIDEO_ID_2', 'Creative Studio')">
                <img src="https://via.placeholder.com/300x200/B8E986/ffffff?text=Creative+Studio" alt="Creative Studio">
                <div class="thumbnail-title">Creative Studio</div>
            </div>

            <!-- Video 4 -->
            <div class="thumbnail" onclick="openVideo('ANOTHER_VIDEO_ID_3', 'Tech Review')">
                <img src="https://via.placeholder.com/300x200/F5A623/ffffff?text=Tech+Review" alt="Tech Review">
                <div class="thumbnail-title">Tech Review</div>
            </div>

            <!-- Video 5 -->
            <div class="thumbnail" onclick="openVideo('ANOTHER_VIDEO_ID_4', 'Design Showcase')">
                <img src="https://via.placeholder.com/300x200/BD10E0/ffffff?text=Design+Showcase" alt="Design Showcase">
                <div class="thumbnail-title">Design Showcase</div>
            </div>

            <!-- Video 6 -->
            <div class="thumbnail" onclick="openVideo('ANOTHER_VIDEO_ID_5', 'Brand Identity')">
                <img src="https://via.placeholder.com/300x200/7ED321/ffffff?text=Brand+Identity" alt="Brand Identity">
                <div class="thumbnail-title">Brand Identity</div>
            </div>
        </div>
    </div>

    <!-- Video Overlay -->
    <div class="overlay" id="videoOverlay">
        <div class="video-container">
            <button class="close-btn" onclick="closeVideo()">×</button>
            <div class="video-player">
                <iframe id="videoFrame" allowfullscreen allow="autoplay"></iframe>
            </div>
        </div>
    </div>

    <script>
        function openVideo(videoId, title) {
            const overlay = document.getElementById('videoOverlay');
            const videoFrame = document.getElementById('videoFrame');
            
            // Set the video source
            videoFrame.src = `https://drive.google.com/file/d/${videoId}/preview`;
            
            // Show the overlay
            overlay.style.display = 'flex';
            
            // Prevent body scroll
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            const overlay = document.getElementById('videoOverlay');
            const videoFrame = document.getElementById('videoFrame');
            
            // Hide the overlay
            overlay.style.display = 'none';
            
            // Stop the video
            videoFrame.src = '';
            
            // Restore body scroll
            document.body.style.overflow = 'auto';
        }

        // Close video when clicking outside the video container
        document.getElementById('videoOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeVideo();
            }
        });

        // Close video with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeVideo();
            }
        });
    </script>
</body>
</html>
