<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Page Viewer</title>
  <link rel="icon" href="Assets/fav/Fav.svg" type="image/x-icon">
  <style>
    :root {
      /* Increased height to use more screen space */
      --view-height: 80vh; 
      
      /* Internal Resolutions */
      --desktop-w: 1920px;
      --desktop-h: 1080px;
      --mobile-w: 390px;
      --mobile-h: 844px;

      /* Dynamic Scaling to match --view-height */
      --desktop-scale: calc(var(--view-height) / var(--desktop-h));
      --mobile-scale: calc(var(--view-height) / var(--mobile-h));
    }

    body {
      display: flex;
      flex-direction: column;
      gap: 100px;
      padding: 60px 40px;
      background: #030303;
      font-family: 'Inter', -apple-system, sans-serif;
      color: white;
      align-items: center;
      margin: 0;
    }

    .preview-section {
      display: flex;
      flex-direction: column;
      gap: 30px;
      width: 100%;
      max-width: 95vw; /* Use almost full width */
    }

    .preview-row {
      display: flex;
      gap: 40px;
      justify-content: center;
      align-items: center;
      flex-wrap: nowrap; /* Keep them side-by-side */
    }

    .preview {
      border: 1px solid #1a1a1a;
      border-radius: 24px;
      background: #000;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
      position: relative;
      overflow: hidden;
    }

    .label {
      text-align: center;
      padding: 10px;
      background: #0a0a0a;
      color: #444;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 4px;
      border-bottom: 1px solid #111;
    }

    .iframe-scaler {
      overflow: hidden;
      position: relative;
      background: #fff;
      height: var(--view-height);
    }

    iframe {
      border: none;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
    }

    /* Desktop Viewport */
    .desktop .iframe-scaler {
      width: calc(var(--desktop-w) * var(--desktop-scale));
    }

    .desktop iframe {
      width: var(--desktop-w);
      height: var(--desktop-h);
      transform: scale(var(--desktop-scale));
    }

    /* Mobile Viewport */
    .mobile .iframe-scaler {
      width: calc(var(--mobile-w) * var(--mobile-scale));
    }

    .mobile iframe {
      width: var(--mobile-w);
      height: var(--mobile-h);
      transform: scale(var(--mobile-scale));
    }

    .section-header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    h2 {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      margin: 0;
      color: #fff;
    }

    .section-header p {
      color: #333;
      margin: 0;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>

  <!-- Section 1: HOME -->
  <section class="preview-section">
    <div class="section-header">
      <h2>Portfolio Hub</h2>
      <p>Synchronized Environment</p>
    </div>
    
    <div class="preview-row">
      <div class="preview desktop">
        <div class="label">Primary Viewport</div>
        <div class="iframe-scaler">
          <iframe name="preview" src="index.html"></iframe>
        </div>
      </div>

      <div class="preview mobile">
        <div class="label">Mobile Viewport</div>
        <div class="iframe-scaler">
          <iframe name="preview" src="index.html"></iframe>
        </div>
      </div>
    </div>
  </section>

  <!-- Section 2: 3D PROJECTS -->
  <section class="preview-section">
    <div class="section-header">
      <h2>Project Canvas</h2>
      <p>Interaction Lab</p>
    </div>

    <div class="preview-row">
      <div class="preview desktop">
        <div class="label">Primary Viewport</div>
        <div class="iframe-scaler">
          <iframe name="preview" src="3D-Projects.html"></iframe>
        </div>
      </div>

      <div class="preview mobile">
        <div class="label">Mobile Viewport</div>
        <div class="iframe-scaler">
          <iframe name="preview" src="3D-Projects.html"></iframe>
        </div>
      </div>
    </div>
  </section>

  <script>
    function applyIframeFix(iframe) {
      try {
        iframe.addEventListener('load', () => {
          const win = iframe.contentWindow;
          win.name = "preview";

          const checkInterval = setInterval(() => {
            if (win.triggerPageTransition && !win.triggerPageTransition.isPatched) {
              const originalTrigger = win.triggerPageTransition;
              win.triggerPageTransition = function(href, targetParent) {
                originalTrigger(href, false);
              };
              win.triggerPageTransition.isPatched = true;
              clearInterval(checkInterval);
            }
          }, 100);
          setTimeout(() => clearInterval(checkInterval), 5000);
        });
      } catch (e) {}
    }

    document.querySelectorAll('iframe').forEach(applyIframeFix);
  </script>

</body>

</html>
