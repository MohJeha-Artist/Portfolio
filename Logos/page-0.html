<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">

    <title> 3D Projects - Medieval Axe </title>
    <link rel="icon" href="../Assets/fav/Fav.svg" type="image/x-icon">
    <!-- ------------------------------------------------------ -->


    <link rel="stylesheet" href="../Styles/base.css">
    <link rel="stylesheet" href="../Styles/base-grid-card.css">

<link rel="stylesheet" href="../Styles/branding.css">
    <link rel="stylesheet" href="../Styles/section-footer.css">


    <!-- Include GLightbox -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
    <link rel="stylesheet" href="../Styles/transitions.css">

    <style>
        html {
            margin-top: 30px;
            background-color: rgba(0, 0, 0, 0.9) !important;
        }

        .body {
            margin-top: 30px;
            max-width: 910px;
            width: 60%;
            margin: 0 auto;
            background-color: transparent
        }

        @media (max-width: 768px) {
            .body {
                width: 97%;
            }
        }
    </style>
</head>


<body class="body is-transitioning">

    <!-- Navigation Transition Overlay -->
    <div id="transition-overlay">
        <div class="loader-content">
            <img src="../Assets/fav/Logo.svg" alt="MohJeha Logo" class="loader-logo">
            <div class="loader-bar-container">
                <div class="loader-bar"></div>
            </div>
        </div>
    </div>

    <!-- IMAGES -->
    <section class="container " style=";border-top: 2px solid var(--3); border-radius: 20px; overflow: hidden;">
        <script>
            const lightbox = GLightbox({ selector: '.glightbox' });
        </script>
        <div id="dynamic-gallery">
        </div>
        <script>
            const galleryContainer = document.getElementById('dynamic-gallery');

            // Configure folder and naming convention here
            const folderPath = "../Assets/Graphics/Logos/Arz/"; 
            const baseName = "Arz";
            const maxImagesToCheck = 5; // Max number of images to try loading

            for (let i = 1; i <= maxImagesToCheck; i++) {
                const link = document.createElement('a');
                link.href = `${folderPath}${baseName}(${i}).webp`;
                link.className = 'glightbox';
                link.style.display = 'none'; // Hide until thumbnail loads

                const img = document.createElement('img');
                img.src = `${folderPath}${baseName}(${i}).webp`;
                img.setAttribute('width', '100%');

                // If thumbnail loads successfully, show the link
                img.onload = function () {
                    link.style.display = 'block';
                    // Refresh GLightbox to recognize the new dynamic link
                    if (typeof lightbox !== 'undefined') {
                        lightbox.reload();
                    }
                };

                // If thumbnail fails to load (file doesn't exist), remove the link
                img.onerror = function () {
                    link.remove();
                };

                link.appendChild(img);
                galleryContainer.appendChild(link);
            }
        </script>

        <div class="closing">
                <img src="../Assets/fav/Fav.svg" alt="Logo" class="logo">
                <p>Like what you see?</p>
                <p>Let's build the next brand that stands out<br>and stands for something meaningful.</p>
            </div>

    </section>


   
    <!-- LENIS -->
    <script src="https://unpkg.com/lenis@1.1.19/dist/lenis.min.js"></script>
    <script src="../js/lenis.js"></script>
    <!-- ---------------- -->

    <script src="page.js"></script>


    <script>
        document.addEventListener('keydown', function (e) {
            if (e.key === "Escape") {
                window.parent.postMessage('closeOverlay', '*');
            }
        });
    </script>

    <!-- Page Transitions -->
    <script src="../Js/transitions.js"></script>
    <!-- ---------------- -->

</body>

</html>
