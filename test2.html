<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Styles/base.css">
    <link rel="stylesheet" href="Styles/base-grid-card.css">
    <link rel="stylesheet" href="Styles/section-footer.css">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="Styles/cinematic-swiper.css">
    <link rel="stylesheet" href="Styles/transitions.css">
</head>

<body>

    <section class="container pad-100">
        <h1 class="title center upper" style="margin-bottom: 2rem;">Custom Grid Layout</h1>

        <!-- Swiper Container for the Slide Effect -->
        <div class="swiper custom-grid-swiper">
            <div class="swiper-wrapper">

                <!-- We place the entire grid as ONE wide slide so Swiper can slide it smoothly -->
                <div class="swiper-slide custom-grid-slide">
                    <div class="parent">
                        <!-- Div 1 to 17 -->
                        <div class="div1 card1"><img src="https://picsum.photos/600/400?random=1"></div>
                        <div class="div2 card1"><img src="https://picsum.photos/600/400?random=2"></div>
                        <div class="div3 card1"><img src="https://picsum.photos/600/400?random=3"></div>
                        <div class="div4 card1"><img src="https://picsum.photos/600/400?random=4"></div>
                        <div class="div5 card1"><img src="https://picsum.photos/600/400?random=5"></div>
                        <div class="div6 card1"><img src="https://picsum.photos/600/400?random=6"></div>
                        <div class="div7 card1"><img src="https://picsum.photos/600/400?random=7"></div>
                        <div class="div8 card1"><img src="https://picsum.photos/600/400?random=8"></div>
                        <div class="div9 card1"><img src="https://picsum.photos/600/400?random=9"></div>
                        <div class="div10 card1"><img src="https://picsum.photos/600/400?random=10"></div>
                        <div class="div11 card1"><img src="https://picsum.photos/600/400?random=11"></div>
                        <div class="div12 card1"><img src="https://picsum.photos/600/400?random=12"></div>
                        <div class="div13 card1"><img src="https://picsum.photos/600/400?random=13"></div>
                        <div class="div14 card1"><img src="https://picsum.photos/600/400?random=14"></div>
                        <div class="div15 card1"><img src="https://picsum.photos/600/400?random=15"></div>
                        <div class="div16 card1"><img src="https://picsum.photos/600/400?random=16"></div>
                        <div class="div17 card1"><img src="https://picsum.photos/600/400?random=17"></div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <style>
        .custom-grid-swiper {
            width: 100%;
            overflow: hidden;
            padding: 15px;
            cursor: grab;
        }

        .custom-grid-swiper:active {
            cursor: grabbing;
        }

        .custom-grid-slide {
            width: auto !important;
            /* Forces the slide to match the width of the .parent grid */
        }

        .parent {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(3, 1fr);

            /* I added a 15px gap here to give it those nice thick lines from the image. 
               You can change this back to 0px if you want them totally flush! */
            grid-column-gap: 15px;
            grid-row-gap: 15px;

            /* Setting a fixed width larger than the screen ensures it fully slides left and right */
            width: 2500px;
            height: 60vh;
            min-height: 500px;
        }

        .div1 { grid-area: 1 / 1 / 3 / 2; }
        .div2 { grid-area: 3 / 1 / 4 / 2; }
        .div3 { grid-area: 1 / 2 / 2 / 3; }
        .div4 { grid-area: 1 / 3 / 2 / 4; }
        .div5 { grid-area: 2 / 2 / 4 / 3; }
        .div6 { grid-area: 2 / 3 / 4 / 4; }
        .div7 { grid-area: 1 / 4 / 3 / 6; }
        .div8 { grid-area: 3 / 4 / 4 / 6; }
        .div9 { grid-area: 2 / 6 / 4 / 7; }
        .div10 { grid-area: 1 / 6 / 2 / 7; }
        .div11 { grid-area: 1 / 7 / 3 / 8; }
        .div12 { grid-area: 3 / 7 / 4 / 8; }
        .div13 { grid-area: 1 / 8 / 2 / 10; }
        .div14 { grid-area: 2 / 8 / 4 / 9; }
        .div15 { grid-area: 2 / 9 / 4 / 10; }
        .div16 { grid-area: 1 / 10 / 3 / 11; }
        .div17 { grid-area: 3 / 10 / 4 / 11; }

        /* Override card styles so it perfectly fits your custom grid */
        .parent .card2 {
            width: 100%;
            height: 100%;
            margin: 0;
            border-radius: 0;
            /* Sharp corners */
            border: none;
            box-shadow: none;
            background: #333;
            aspect-ratio: auto !important;
            position: relative;
            overflow: hidden;
        }

        .parent .card2::before {
            display: none;
            /* Remove gradient overlay */
        }

        .parent img {
            width: 100%;
            height: 100%;
            scale: 1.2  ;
            transition: all 0.6s ease-in-out;
        }
        .parent:not(.hover)   
        { img:not(:hover) { filter: grayscale(100%); opacity: 0.5; scale: 1; transition: all 0.6s ease-in-out;}  }
       
         

    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var myGridSwiper = new Swiper('.custom-grid-swiper', {
                slidesPerView: 'auto',
                freeMode: true,
                mousewheel: {
                    forceToAxis: true,
                },
                keyboard: {
                    enabled: true,
                },
                grabCursor: true
            });
        });
    </script>
</body>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="Js/cinematic-swiper.js"></script>

</html>
